<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🐶 Dog Breed Classifier</title>
    
    <!-- React from CDN -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #ff6b6b;
            --secondary: #4ecdc4;
            --accent: #ffa502;
            --dark: #2c3e50;
            --light: #ecf0f1;
            --success: #51cf66;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        #root {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 600px;
            width: 100%;
            padding: 40px;
            animation: slideIn 0.5s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header p {
            color: #666;
            font-size: 1.1em;
        }

        .upload-section {
            margin-bottom: 30px;
        }

        .file-input-wrapper {
            position: relative;
            display: inline-block;
            width: 100%;
        }

        .file-input-label {
            display: block;
            padding: 20px;
            border: 3px dashed var(--secondary);
            border-radius: 10px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: #f8f9fa;
        }

        .file-input-label:hover {
            border-color: var(--primary);
            background: #f0f0ff;
        }

        .file-input-label.dragover {
            border-color: var(--primary);
            background: #ffe8e8;
        }

        input[type="file"] {
            display: none;
        }

        .file-input-text {
            font-size: 1.1em;
            color: var(--dark);
            font-weight: 500;
        }

        .file-name {
            font-size: 0.9em;
            color: var(--success);
            margin-top: 5px;
            font-weight: 600;
        }

        .preview-section {
            margin: 30px 0;
            text-align: center;
        }

        .preview-image {
            max-width: 100%;
            max-height: 300px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            animation: fadeIn 0.3s ease-in;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(0.95);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .button-group {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }

        button {
            padding: 12px 30px;
            font-size: 1em;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-predict {
            background: linear-gradient(135deg, var(--primary), var(--accent));
            color: white;
            flex: 1;
            min-width: 150px;
        }

        .btn-predict:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(255, 107, 107, 0.3);
        }

        .btn-predict:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .btn-clear {
            background: #e0e0e0;
            color: var(--dark);
            flex: 1;
            min-width: 150px;
        }

        .btn-clear:hover {
            background: #d0d0d0;
        }

        .loading {
            text-align: center;
            padding: 20px;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid var(--primary);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .result-section {
            background: linear-gradient(135deg, #e8f5e9, #c8e6c9);
            padding: 25px;
            border-radius: 10px;
            margin: 20px 0;
            animation: slideIn 0.5s ease-out;
            border-left: 5px solid var(--success);
        }

        .result-label {
            color: #2e7d32;
            font-size: 0.9em;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .result-breed {
            font-size: 2em;
            color: var(--dark);
            font-weight: 700;
            margin-bottom: 15px;
        }

        .confidence-bar {
            background: #e0e0e0;
            border-radius: 10px;
            height: 8px;
            overflow: hidden;
            margin-bottom: 10px;
        }

        .confidence-fill {
            background: linear-gradient(90deg, var(--success), var(--secondary));
            height: 100%;
            transition: width 0.5s ease-out;
            animation: fillWidth 0.5s ease-out;
        }

        @keyframes fillWidth {
            from {
                width: 0;
            }
        }

        .confidence-text {
            font-size: 0.95em;
            color: #2e7d32;
            font-weight: 600;
        }

        .error-section {
            background: linear-gradient(135deg, #ffebee, #ffcdd2);
            padding: 25px;
            border-radius: 10px;
            margin: 20px 0;
            border-left: 5px solid var(--primary);
            animation: slideIn 0.5s ease-out;
        }

        .error-text {
            color: #c62828;
            font-weight: 500;
        }

        .info-text {
            text-align: center;
            color: #999;
            font-size: 0.9em;
            margin-top: 20px;
        }

        @media (max-width: 600px) {
            .container {
                padding: 25px;
            }

            .header h1 {
                font-size: 2em;
            }

            .button-group {
                flex-direction: column;
            }

            .btn-predict,
            .btn-clear {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef } = React;

        function DogBreedClassifier() {
            const [selectedFile, setSelectedFile] = useState(null);
            const [preview, setPreview] = useState(null);
            const [result, setResult] = useState(null);
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState(null);
            const fileInputRef = useRef(null);
            const dropZoneRef = useRef(null);

            const handleFileSelect = (file) => {
                if (file && file.type.startsWith('image/')) {
                    setSelectedFile(file);
                    setError(null);
                    
                    // Create preview
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        setPreview(e.target.result);
                    };
                    reader.readAsDataURL(file);
                } else {
                    setError('Please select a valid image file');
                }
            };

            const handleInputChange = (e) => {
                const file = e.target.files[0];
                if (file) handleFileSelect(file);
            };

            const handleDragOver = (e) => {
                e.preventDefault();
                e.stopPropagation();
                dropZoneRef.current?.classList.add('dragover');
            };

            const handleDragLeave = (e) => {
                e.preventDefault();
                e.stopPropagation();
                dropZoneRef.current?.classList.remove('dragover');
            };

            const handleDrop = (e) => {
                e.preventDefault();
                e.stopPropagation();
                dropZoneRef.current?.classList.remove('dragover');
                
                const file = e.dataTransfer.files[0];
                if (file) handleFileSelect(file);
            };

            const handlePredict = async () => {
                if (!selectedFile) {
                    setError('Please select an image first');
                    return;
                }

                setLoading(true);
                setError(null);
                setResult(null);

                try {
                    const formData = new FormData();
                    formData.append('file', selectedFile);

                    const response = await fetch('/predict', {
                        method: 'POST',
                        body: formData
                    });

                    if (!response.ok) {
                        throw new Error('Prediction failed');
                    }

                    const data = await response.json();
                    
                    if (data.error) {
                        setError(data.error);
                    } else {
                        setResult({
                            breed: data.breed,
                            confidence: data.confidence
                        });
                    }
                } catch (err) {
                    setError(err.message || 'An error occurred during prediction');
                } finally {
                    setLoading(false);
                }
            };

            const handleClear = () => {
                setSelectedFile(null);
                setPreview(null);
                setResult(null);
                setError(null);
                if (fileInputRef.current) {
                    fileInputRef.current.value = '';
                }
            };

            // Parse confidence percentage
            const confidenceValue = result ? parseFloat(result.confidence) : 0;

            return (
                <div className="container">
                    <div className="header">
                        <h1>🐶 Dog Breed Classifier</h1>
                        <p>Upload an image to identify the dog breed</p>
                    </div>

                    <div className="upload-section">
                        <div
                            className="file-input-label"
                            ref={dropZoneRef}
                            onDragOver={handleDragOver}
                            onDragLeave={handleDragLeave}
                            onDrop={handleDrop}
                            onClick={() => fileInputRef.current?.click()}
                        >
                            <input
                                ref={fileInputRef}
                                type="file"
                                accept="image/*"
                                onChange={handleInputChange}
                            />
                            <div className="file-input-text">
                                📁 Click to upload or drag & drop
                            </div>
                            {selectedFile && (
                                <div className="file-name">
                                    ✓ {selectedFile.name}
                                </div>
                            )}
                        </div>
                    </div>

                    {preview && (
                        <div className="preview-section">
                            <img src={preview} alt="Preview" className="preview-image" />
                        </div>
                    )}

                    {loading && (
                        <div className="loading">
                            <div className="spinner"></div>
                            <p>Analyzing image...</p>
                        </div>
                    )}

                    {error && (
                        <div className="error-section">
                            <div className="error-text">
                                ❌ {error}
                            </div>
                        </div>
                    )}

                    {result && !loading && (
                        <div className="result-section">
                            <div className="result-label">Prediction Result</div>
                            <div className="result-breed">{result.breed}</div>
                            <div className="confidence-bar">
                                <div
                                    className="confidence-fill"
                                    style={{ width: `${confidenceValue}%` }}
                                ></div>
                            </div>
                            <div className="confidence-text">
                                Confidence: {result.confidence}
                            </div>
                        </div>
                    )}

                    <div className="button-group">
                        <button
                            className="btn-predict"
                            onClick={handlePredict}
                            disabled={!selectedFile || loading}
                        >
                            {loading ? 'Predicting...' : '🔍 Predict Breed'}
                        </button>
                        <button
                            className="btn-clear"
                            onClick={handleClear}
                            disabled={loading}
                        >
                            Clear
                        </button>
                    </div>

                    <div className="info-text">
                        Try uploading a photo of a dog to get breed predictions
                    </div>
                </div>
            );
        }

        ReactDOM.render(<DogBreedClassifier />, document.getElementById('root'));
    </script>
</body>
</html>
